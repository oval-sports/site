{{ define "main" }}
<article class="single-page section">
  <div class="container container-narrow">
    <header class="page-header">
      <h1>{{ .Title }}</h1>
      {{ if .Date }}<time class="post-date">{{ .Date.Format "January 2, 2006" }}</time>{{ end }}
    </header>
    <div class="page-content">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
